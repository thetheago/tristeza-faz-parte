<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tristeza Faz Parte — Nani Ely</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --red: #c0392b;
      --red-muted: #7a2320;
      --text: #e8e0d8;
      --text-muted: #6b6560;
      --page-shadow: 0 8px 40px rgba(0,0,0,0.8);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      overflow: hidden;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
      padding: 0 16px;
    }

    .title-bar {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .book-title {
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    .book-title span {
      color: var(--red);
    }

    .book-author {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
      letter-spacing: 0.08em;
    }

    .divider {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    #viewer {
      position: fixed;
      top: 52px;
      bottom: 64px;
      left: 0;
      right: 0;
      overflow-y: auto;
      overflow-x: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px 8px;
      background: var(--bg);
      -webkit-overflow-scrolling: touch;
    }

    #canvas-wrapper {
      position: relative;
      display: inline-block;
      box-shadow: var(--page-shadow);
    }

    canvas#pdf-canvas {
      display: block;
      background: white;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 10;
    }

    .nav-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 20px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      letter-spacing: 0.08em;
      transition: border-color 0.2s, color 0.2s;
      border-radius: 2px;
    }

    .nav-btn:hover:not(:disabled) {
      border-color: var(--red);
      color: var(--red);
    }

    .nav-btn:disabled {
      opacity: 0.25;
      cursor: default;
    }

    #page-info {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      min-width: 90px;
      text-align: center;
    }

    #page-info strong {
      color: var(--red);
    }

    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
    }

    .loader-title {
      font-size: 22px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .loader-title span { color: var(--red); }

    .loader-bar {
      width: 200px;
      height: 1px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    .loader-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: -60%;
      width: 60%;
      height: 100%;
      background: var(--red);
      animation: slide 1.2s ease-in-out infinite;
    }

    @keyframes slide {
      to { left: 100%; }
    }

    .loader-sub {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      font-style: italic;
    }

    @media (max-width: 600px) {
      .book-author, .divider { display: none; }
      .nav-btn { padding: 10px 18px; font-size: 13px; }
      footer { gap: 16px; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="loader-title">Tristeza Faz <span>Parte</span></div>
  <div class="loader-bar"></div>
  <div class="loader-sub">Nani Ely</div>
</div>

<header>
  <div class="title-bar">
    <span class="book-title">Tristeza Faz <span>Parte</span></span>
    <div class="divider"></div>
    <span class="book-author">Nani Ely</span>
  </div>
</header>

<div id="viewer">
  <div id="canvas-wrapper">
    <canvas id="pdf-canvas"></canvas>
  </div>
</div>

<footer>
  <button class="nav-btn" id="btn-prev">← Anterior</button>
  <div id="page-info">— / —</div>
  <button class="nav-btn" id="btn-next">Próxima →</button>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const canvas = document.getElementById('pdf-canvas');
  const ctx = canvas.getContext('2d');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  const pageInfo = document.getElementById('page-info');
  const loading = document.getElementById('loading');
  const viewer = document.getElementById('viewer');

  let pdfDoc = null;
  let currentPage = 1;
  let rendering = false;

  const isMobile = () => window.innerWidth < 700;

  function computeScale(page) {
    const dpr = window.devicePixelRatio || 1;
    const vp = page.getViewport({ scale: 1 });
    const padding = isMobile() ? 16 : 32;
    const availW = viewer.clientWidth - padding;

    if (isMobile()) {
      // Preenche a largura inteira; usuário rola verticalmente
      return (availW / vp.width) * Math.min(dpr, 2);
    }

    const availH = viewer.clientHeight - 48;
    const scaleW = availW / vp.width;
    const scaleH = availH / vp.height;
    return Math.min(scaleW, scaleH, 2.5) * Math.min(dpr, 2);
  }

  async function renderPage(num) {
    if (rendering) return;
    rendering = true;

    const page = await pdfDoc.getPage(num);
    const scale = computeScale(page);
    const vp = page.getViewport({ scale });
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    canvas.width = vp.width;
    canvas.height = vp.height;
    canvas.style.width = (vp.width / dpr) + 'px';
    canvas.style.height = (vp.height / dpr) + 'px';

    await page.render({ canvasContext: ctx, viewport: vp }).promise;

    pageInfo.innerHTML = `<strong>${num}</strong> / ${pdfDoc.numPages}`;
    btnPrev.disabled = num <= 1;
    btnNext.disabled = num >= pdfDoc.numPages;

    rendering = false;
  }

  async function init() {
    const pdfPath = './TristezaFazParte.pdf';
    pdfDoc = await pdfjsLib.getDocument(pdfPath).promise;
    loading.style.display = 'none';
    await renderPage(currentPage);
  }

  btnPrev.addEventListener('click', async () => {
    if (currentPage <= 1) return;
    currentPage--;
    viewer.scrollTop = 0;
    await renderPage(currentPage);
  });

  btnNext.addEventListener('click', async () => {
    if (currentPage >= pdfDoc?.numPages) return;
    currentPage++;
    viewer.scrollTop = 0;
    await renderPage(currentPage);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') btnPrev.click();
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') btnNext.click();
  });

  window.addEventListener('resize', () => {
    if (pdfDoc) renderPage(currentPage);
  });

  // Swipe para navegar no mobile
  let touchStartX = 0;
  let touchStartY = 0;
  viewer.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  viewer.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      if (dx < 0) btnNext.click();
      else btnPrev.click();
    }
  }, { passive: true });

  init().catch(err => {
    loading.innerHTML = `<div style="color:#c0392b;font-size:13px;text-align:center;padding:20px">
      Erro ao carregar o livro.<br><small style="color:#666;margin-top:8px;display:block">${err.message}</small>
    </div>`;
  });
</script>

</body>
</html>
